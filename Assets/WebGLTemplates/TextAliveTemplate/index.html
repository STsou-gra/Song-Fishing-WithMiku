<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song-FishingWithMiku</title>
  <script src="https://unpkg.com/textalive-app-api@latest/dist/index.js"></script>
  <style>
    body{margin: 0; background-color: #000; overflow: hidden;}
    #unity-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;}
    #unity-canvas {width: 100%; height:100%; background: #231f20;}
    #media {position: absolute; bottom: 10px; right: 10px; z-index: 10; color: white;}
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="media"></div>
  <script>
    //UnityWebGLの読み込み設定(Unityビルド時に自動で書き換わる)
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Song-Fishing-WithMiku_Build_WebGL.loader.js";
    var config = {
            dataUrl: buildUrl + "/Song-Fishing-WithMiku_Build_WebGL.data.unityweb",
            frameworkUrl: buildUrl + "/Song-Fishing-WithMiku_Build_WebGL.framework.js.unityweb",
            codeUrl: buildUrl + "/Song-Fishing-WithMiku_Build_WebGL.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Song-Fishing-WithMiku",
            productVersion: "0.1",
        };

        var canvas = document.querySelector("#unity-canvas");
        var script = document.createElement("script");
        script.src = loaderUrl;
        
        // Unityインスタンスを保持するグローバル変数
        window.unityInstance = null;

        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                // 読み込み進捗
            }).then((instance) => {
                window.unityInstance = instance;
                // Unityの準備ができたらTextAliveを動かす
                initTextAlive();
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);

        // ─── TextAlive API の実装 ───
        function initTextAlive() {
            const player = new TextAliveApp.Player({
                app: {
                    name: "Song-Fishing-WithMiku",
                    //token:"rEmOWtB15JjOdHcY"
                },
                mediaElement: document.getElementById("media")
            });

            // グローバルに保持（jslibから叩けるようにする）
            window.player = player;

            window.PlaySongJS = function() {
                if(window.player){
                window.player.requestPlay();
                console.log("Unityからのリクエストで曲の再生を開始");
                }
            };
            window.PauseSongJS = function() {
                if(window.player){
                window.player.requestPause();
                console.log("Unityからのリクエストで曲の一時停止");
                }
            };

            player.addListener({
                onAppReady(app) {
                    console.log("TextAlive API が利用可能になりました。");
                    setTimeout(() => {
                        player.createFromSongUrl("https://piapro.jp/t/6W2N");
                    }, 3000); // 少し遅延させてから曲を読み込む
                },
                onVideoReady() {
                    console.log("曲の読み込み完了。歌詞データを抽出します。");
                    let lyricsList = [];
                    let currentPhrase = player.video.firstPhrase;

                    while (currentPhrase) {
                        let currentWord = currentPhrase.firstWord;
                        while (currentWord) {
                            let currentChar = currentWord.firstChar;
                            while (currentChar) {
                                lyricsList.push({
                                    letter: currentChar.text,
                                    time: currentChar.startTime / 1000.0 // 秒に変換
                                });
                                currentChar = currentChar.next;
                            }
                            currentWord = currentWord.next;
                        }
                        currentPhrase = currentPhrase.next;
                    }

                    // JSONにしてUnityのGameManagerへ一括送信
                    let jsonString = JSON.stringify({ data: lyricsList });
                    window.unityInstance.SendMessage('GameManager', 'SetSongDataFromJS', jsonString);
                },
                onTimeUpdate(position) {
                    // 現在の再生時間（秒）をUnityにリアルタイム送信
                    if (window.unityInstance) {
                        window.unityInstance.SendMessage('GameManager', 'UpdateCurrentTimeFromJS', position / 1000.0);
                    }
                }
            });
        }
  </script>
</body>
</html>
